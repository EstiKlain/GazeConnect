# version: '3.9'

networks:
  gazeconnect-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  face_photos:

services:

  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gazeconnect-db
    environment:
      POSTGRES_DB: gazeconnect
      POSTGRES_USER: gazeuser
      POSTGRES_PASSWORD: GazePass2025!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gazeconnect-network
    mem_limit: 1g
    cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gazeuser -d gazeconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gazeconnect-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gazeconnect.com
      PGADMIN_DEFAULT_PASSWORD: GazeAdmin2025!
    ports:
      - "5050:80"
    networks:
      - gazeconnect-network
    mem_limit: 256m
    cpus: '0.3'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gazeconnect-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gazeconnect-network
    mem_limit: 256m
    cpus: '0.3'
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: gazeconnect-redisinsight
    ports:
      - "5540:5540"
    networks:
      - gazeconnect-network
    mem_limit: 256m
    cpus: '0.3'
    restart: unless-stopped

  # ── C# Services ─────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/csharp/Gateway/GazeConnect.ApiGateway
      dockerfile: Dockerfile
    container_name: gazeconnect-api-gateway
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres
      - redis
      - camerahub
      - aac-board
      - tts-voice
      - user-profile
    networks:
      - gazeconnect-network
    mem_limit: 512m
    cpus: '0.5'
    restart: unless-stopped

  camerahub:
    build:
      context: ./services/csharp/Services/GazeConnect.CameraHub
      dockerfile: Dockerfile
    container_name: gazeconnect-camerahub
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - FaceRecognition__BaseUrl=http://face-recognition:8001
    depends_on:
      - redis
      - face-recognition
    networks:
      - gazeconnect-network
    mem_limit: 512m
    cpus: '0.5'
    restart: unless-stopped

  aac-board:
    image: alpine
    container_name: gazeconnect-aac-board
    command: /bin/sh -c "while true; do sleep 3600; done"
    ports:
      - "5002:5002"
    networks:
      - gazeconnect-network
    mem_limit: 512m
    cpus: '0.5'
    restart: unless-stopped

  tts-voice:
    image: alpine
    container_name: gazeconnect-tts-voice
    command: /bin/sh -c "while true; do sleep 3600; done"
    ports:
      - "5003:5003"
    networks:
      - gazeconnect-network
    mem_limit: 512m
    cpus: '0.5'
    restart: unless-stopped

  user-profile:
    image: alpine
    container_name: gazeconnect-user-profile
    command: /bin/sh -c "while true; do sleep 3600; done"
    ports:
      - "5004:5004"
    networks:
      - gazeconnect-network
    mem_limit: 512m
    cpus: '0.5'
    restart: unless-stopped

  # ── Python / AI Services ────────────────────────────────────
  face-recognition:
    build:
      context: ./services/python/face_recognition
      dockerfile: Dockerfile
    container_name: gazeconnect-face-recognition
    ports:
      - "8001:8001"
    env_file:                                        # ← במקום environment
      - ./services/python/face_recognition/.env  # ← קובץ env עם כל המשתנים (לשמור על סודיות)
    volumes:
      - face_photos:/app/photos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - gazeconnect-network
    mem_limit: 1g
    cpus: '1.0'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  object-detection:
    image: alpine
    container_name: gazeconnect-object-detection
    command: /bin/sh -c "while true; do sleep 3600; done"
    ports:
      - "8002:8002"
    networks:
      - gazeconnect-network
    mem_limit: 1g
    cpus: '1.0'
    restart: unless-stopped

  smart-bundle:
    image: alpine
    container_name: gazeconnect-smart-bundle
    command: /bin/sh -c "while true; do sleep 3600; done"
    ports:
      - "8003:8003"
    networks:
      - gazeconnect-network
    mem_limit: 1g
    cpus: '1.0'
    restart: unless-stopped

  visual-learning:
    image: alpine
    container_name: gazeconnect-visual-learning
    command: /bin/sh -c "while true; do sleep 3600; done"
    ports:
      - "8004:8004"
    networks:
      - gazeconnect-network
    mem_limit: 1g
    cpus: '1.0'
    restart: unless-stopped

  ai-suggestion:
    image: alpine
    container_name: gazeconnect-ai-suggestion
    command: /bin/sh -c "while true; do sleep 3600; done"
    ports:
      - "8005:8005"
    networks:
      - gazeconnect-network
    mem_limit: 1g
    cpus: '1.0'
    restart: unless-stopped